<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <meta name="description" content="Smart Cine" />
  <title>Smart Cine</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Teko:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --panel: #0a0a0a;
      --panel-2: #111111;
      --text: #f4f4f4;
      --muted: #b6b6b6;
      --gold: #d4af37;
      --gold-2: #e8c34c;
      --blue: #0d3876;
      --blue-border: #0a4fa8;
      --orange: #5a2509;
      --orange-border: #9b4f1e;
      --green: #00360d;
      --green-border: #0db14b;
      --olive: #2f3004;
      --olive-border: #8f7a0d;
      --shadow: 0 0 0 1px rgba(212,175,55,.08), 0 18px 45px rgba(0,0,0,.45);
      --radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Arial, sans-serif; }
    body { min-height: 100vh; background: linear-gradient(180deg, #050505 0%, #090909 100%); }
    button, input, select { font-family: inherit; }

    .app { max-width: 880px; margin: 0 auto; padding: 12px 14px 30px; }
    .screen { display: none; opacity: 0; }
    .screen.active { display: block; opacity: 1; }
    .screen.anim-enter-right { animation: screenEnterRight .24s ease; }
    .screen.anim-enter-left { animation: screenEnterLeft .24s ease; }
    .screen.anim-detail { animation: screenDetail .22s ease; }

    @keyframes screenEnterRight {
      from { opacity: 0; transform: translateX(24px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes screenEnterLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes screenDetail {
      from { opacity: 0; transform: scale(.985) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .top-brand {
      display: flex; align-items: center; gap: 14px;
      padding: 10px 0 14px; border-bottom: 1px solid rgba(255,255,255,.08);
      margin-bottom: 10px;
    }
    .logo-wrap {
      width: 58px; height: 58px; border-radius: 50%; overflow: hidden; flex: 0 0 58px;
      background: #111; border: 1px solid rgba(212,175,55,.18); box-shadow: 0 0 18px rgba(212,175,55,.12);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .brand-fallback {
      font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 18px; display:none;
    }
    .brand-title {
      font-family: 'Teko', sans-serif; font-size: 28px; line-height: 1; letter-spacing: 1px; color: var(--gold);
      text-transform: uppercase; margin: 0 0 2px;
      text-shadow: 0 0 14px rgba(212,175,55,.18);
    }
    .brand-sub { color: #a7a7a7; font-size: 13px; letter-spacing: 1.8px; text-transform: uppercase; }

    .hero-title {
      font-family: 'Teko', sans-serif; font-size: clamp(40px, 8vw, 64px);
      text-align: center; line-height: .95; text-transform: uppercase; color: var(--gold);
      margin: 14px 0 0; letter-spacing: 2px;
    }
    .hero-sub {
      text-align: center; color: #9f9fb2; letter-spacing: 6px; text-transform: uppercase; font-size: 14px;
      margin: 6px 0 18px;
    }
    .status-bar {
      display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
      background: linear-gradient(180deg, rgba(0,32,12,.65), rgba(0,23,10,.45));
      border: 1px solid rgba(11,177,75,.28); border-radius: 0; padding: 14px 18px; margin-bottom: 16px;
      box-shadow: inset 0 0 0 1px rgba(11,177,75,.08);
    }
    .status-chip { display:flex; align-items:center; gap:10px; font-family: 'Teko', sans-serif; font-size: 18px; letter-spacing: 1px; color: #efefef; }
    .dot { width: 15px; height: 15px; border-radius: 50%; background: #17a34a; box-shadow: 0 0 10px rgba(23,163,74,.45); }

    .section-banner {
      margin: 10px 0 18px; background: linear-gradient(90deg, #060606 0%, #2c2105 45%, #7a6317 75%, #121212 100%);
      border: 1px solid rgba(212,175,55,.18); padding: 11px 16px; text-align: center; color: var(--gold);
      font-family: 'Teko', sans-serif; font-size: 20px; letter-spacing: 2px; text-transform: uppercase;
    }

    .dash-grid {
      display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 20px 22px; margin-bottom: 26px;
    }
    .dashboard-btn {
      position: relative; min-height: 178px; border-radius: 24px; border: 2px solid transparent;
      padding: 18px 16px 16px; cursor: pointer; overflow: hidden;
      display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 0 22px rgba(0,0,0,.35);
      transition: transform .18s ease, filter .18s ease;
    }
    .dashboard-btn:hover, .dashboard-btn:active { transform: translateY(-1px); filter: brightness(1.05); }
    .dashboard-btn .icon { font-size: 54px; margin-bottom: 12px; line-height: 1; }
    .dashboard-btn .title { font-family: 'Teko', sans-serif; font-size: 24px; letter-spacing: 1px; text-transform: uppercase; margin: 0; }
    .dashboard-btn .sub { margin-top: 8px; font-size: 16px; font-weight: 700; color: #d8d8d8; }

    .btn-filmes {
      background: linear-gradient(180deg, #04152f 0%, #011325 100%);
      border-color: rgba(22,103,210,.55);
      color: #77b7ff;
      box-shadow: 0 0 0 1px rgba(22,103,210,.18), inset 0 0 22px rgba(5,42,95,.28);
    }
    .btn-filmes .title { color: #d7ecff; }

    .btn-series {
      background: linear-gradient(180deg, #381904 0%, #231004 100%);
      border-color: rgba(184,101,39,.6);
      color: #ffa259;
      box-shadow: 0 0 0 1px rgba(184,101,39,.18), inset 0 0 22px rgba(102,46,9,.26);
    }
    .btn-series .title { color: #ffd2ad; }

    .wide-action {
      width: 100%; border: none; border-radius: 24px; padding: 30px 18px; cursor: pointer;
      font-family: 'Teko', sans-serif; font-size: clamp(28px, 5vw, 40px); letter-spacing: 1px; text-transform: uppercase;
      background: linear-gradient(180deg, #deb82d 0%, #c49a19 100%); color: #000; font-weight: 700;
      box-shadow: 0 0 30px rgba(212,175,55,.35), inset 0 0 0 2px rgba(255,255,255,.22);
      margin-bottom: 18px;
    }

    .toolbar {
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-bottom: 14px;
    }
    .screen-title {
      font-family: 'Teko', sans-serif; font-size: 32px; color: var(--gold); text-transform: uppercase; margin: 0; letter-spacing: 1px;
    }
    .btn-back, .btn-chip, .btn-secondary, .btn-primary, .btn-list {
      border:none; border-radius: 14px; cursor:pointer; font-weight: 700;
    }
    .btn-back, .btn-chip, .btn-secondary {
      background:#161616; color:#fff; border:1px solid rgba(255,255,255,.08); padding:11px 14px;
    }
    .btn-chip.active { color: var(--gold); border-color: rgba(212,175,55,.35); background: rgba(212,175,55,.07); }
    .btn-primary {
      background: linear-gradient(180deg, #deb82d 0%, #c49a19 100%); color:#000; padding:12px 16px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.2);
    }
    .btn-list { padding: 10px 12px; color:#fff; }
    .btn-edit { background: linear-gradient(180deg, #0b5c27, #073316); }
    .btn-delete { background: linear-gradient(180deg, #7c210f, #4a1208); }

    .content-grid { display:grid; grid-template-columns: 1fr; gap:16px; }
    .screen-page { min-height: calc(100vh - 36px); padding-bottom: 18px; }
    .panel {
      background: linear-gradient(180deg, #0d0d0d 0%, #151515 100%); border:1px solid rgba(212,175,55,.12);
      border-radius: 20px; padding: 16px; box-shadow: var(--shadow);
    }
    .panel h3 {
      margin:0 0 12px; font-family:'Teko', sans-serif; font-size: 24px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px;
    }
    .form-grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field.full { grid-column:1 / -1; }
    .field label { font-size:14px; color:#e6e6e6; font-weight:700; }
    .field input {
      width:100%; padding:13px 14px; border-radius: 14px; border:1px solid rgba(255,255,255,.08);
      background:#0b0b0b; color:#fff; font-size:16px; outline:none;
    }
    .field input:focus { border-color: rgba(212,175,55,.45); box-shadow: 0 0 0 3px rgba(212,175,55,.10); }

    .stars { display:grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap:8px; }
    .star {
      background:#0b0b0b; color:#777; border:1px solid rgba(212,175,55,.12); border-radius: 14px;
      padding:11px 0; text-align:center; font-size: 24px; cursor:pointer; transition: .16s ease;
    }
    .star.active { color: var(--gold); background: rgba(212,175,55,.08); border-color: rgba(212,175,55,.45); }

    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top: 14px; }
    .search-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 14px; }
    .search-row input {
      flex:1; min-width:220px; padding:13px 14px; border-radius:14px; border:1px solid rgba(255,255,255,.08);
      background:#0b0b0b; color:#fff; font-size:16px; outline:none;
    }

    .list { display:flex; flex-direction:column; gap:12px; }
    .item {
      background: linear-gradient(180deg, #111111, #1a1a1a); border-left:4px solid var(--gold);
      border-radius: 18px; padding: 14px; display:grid; grid-template-columns: 1fr auto; gap:12px; align-items:center;
      box-shadow: 0 0 0 1px rgba(255,255,255,.04);
    }
    .item-name { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .item-meta { color:#d3d3d3; font-size:16px; display:flex; gap:12px; flex-wrap:wrap; }
    .item-stars { color: var(--gold); margin-top: 8px; font-size: 19px; letter-spacing: 1px; }
    .item-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .empty { text-align:center; color:#b7b7b7; padding:22px; border:1px dashed rgba(212,175,55,.16); border-radius: 16px; }

    
    textarea {
      width:100%; padding:13px 14px; border-radius: 14px; border:1px solid rgba(255,255,255,.08);
      background:#0b0b0b; color:#fff; font-size:16px; outline:none; min-height:110px; resize:vertical;
    }
    textarea:focus { border-color: rgba(212,175,55,.45); box-shadow: 0 0 0 3px rgba(212,175,55,.10); }
    .item-main { cursor:pointer; }
    .detail-cover {
      width: 100%; max-width: 360px; aspect-ratio: 2 / 3; object-fit: cover; border-radius: 18px;
      border: 1px solid rgba(212,175,55,.18); background:#111; display:block; margin: 0 auto 16px;
      box-shadow: 0 0 24px rgba(0,0,0,.35);
    }
    .detail-cover-fallback {
      width: 100%; max-width: 360px; aspect-ratio: 2 / 3; border-radius: 18px; margin: 0 auto 16px;
      border: 1px solid rgba(212,175,55,.18); background: linear-gradient(180deg,#111,#1a1a1a);
      display:flex; align-items:center; justify-content:center; color: var(--gold); font-family:'Teko', sans-serif;
      font-size: 28px; letter-spacing: 2px; text-transform: uppercase;
      box-shadow: 0 0 24px rgba(0,0,0,.35);
    }
    .detail-grid { display:grid; grid-template-columns: 380px 1fr; gap:18px; }
    .detail-meta { display:flex; gap:10px; flex-wrap:wrap; margin-bottom: 12px; }
    .detail-pill {
      background:#111; border:1px solid rgba(212,175,55,.14); border-radius: 999px; padding: 8px 12px;
      color:#ececec; font-size:15px;
    }
    .detail-synopsis {
      background: #0c0c0c; border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:14px;
      color:#dfdfdf; line-height:1.5; min-height: 150px;
    }
    
    .splash-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(circle at center, rgba(20,30,48,.35) 0%, #050505 70%);
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      transition: opacity .45s ease, visibility .45s ease;
    }
    .splash-screen.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }
    .splash-logo {
      width: 180px; max-width: 55vw;
      filter: drop-shadow(0 0 24px rgba(212,175,55,.28));
      animation: splashPulse 1.8s ease-in-out infinite alternate;
    }
    .splash-title {
      margin-top: 18px; font-family: 'Teko', sans-serif; font-size: 38px;
      letter-spacing: 2px; color: var(--gold); text-transform: uppercase;
      text-shadow: 0 0 18px rgba(212,175,55,.2);
    }
    .splash-sub {
      color: #d0d7e6; letter-spacing: 3px; font-size: 13px; text-transform: uppercase; margin-top: 4px;
    }
    @keyframes splashPulse {
      from { transform: scale(.96); opacity: .92; }
      to { transform: scale(1.02); opacity: 1; }
    }
    .hero-logo-wrap {
      text-align:center; margin-top:10px; position: relative;
      animation: heroFloat 3.6s ease-in-out infinite;
    }
    .hero-logo-wrap img {
      width: 140px; max-width:80%;
      filter: drop-shadow(0 0 20px rgba(212,175,55,.25));
      animation: logoReveal .8s ease;
    }
    @keyframes heroFloat {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes logoReveal {
      from { opacity: 0; transform: scale(.92) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 820px) {
      .detail-grid { grid-template-columns: 1fr; }
    }


    @media (max-width: 720px) {
      .dash-grid { gap: 18px; }
      .dashboard-btn { min-height: 178px; }
      .form-grid { grid-template-columns: 1fr; }
      .item { grid-template-columns: 1fr; }
      .item-actions .btn-list { flex:1; }
    }
  </style>
</head>
<body>

  <div id="splashScreen" class="splash-screen">
    <img src="logo.png" alt="Smart Cine" class="splash-logo" onerror="this.style.display='none'">
    <div class="splash-title">Smart Cine</div>
    <div class="splash-sub">Seu controle de filmes e séries</div>
  </div>
  <div class="app">
    <section id="dashboard" class="screen active">

      <div class="hero-logo-wrap">
        <img src="logo.png" alt="Smart Cine Logo" onerror="this.style.display='none'">
      </div>

      <div class="hero-title">Smart Cine</div>
      <div class="hero-sub">Seu controle de filmes e séries</div>

      <div class="status-bar">
        <div class="status-chip"><span class="dot"></span><span>Sistema ativo</span></div>
        <div class="status-chip"><span>Biblioteca pessoal</span></div>
      </div>

      <div class="section-banner">Cadastro de Filmes e Séries</div>



      <div class="dash-grid">
        <button type="button" class="dashboard-btn btn-filmes" onclick="showScreen('filmes')">
          <div class="icon">≣</div>
          <div class="title">Filmes</div>
          <div class="sub"><span id="countFilmes">0</span> cadastrados</div>
        </button>

        <button type="button" class="dashboard-btn btn-series" onclick="showScreen('series')">
          <div class="icon">◉</div>
          <div class="title">Séries</div>
          <div class="sub"><span id="countSeries">0</span> cadastradas</div>
        </button>
      </div>

<div style="margin-top:10px;text-align:center">
<button type="button" style="padding:14px 20px;font-size:18px;border-radius:16px;background:#161616;color:#d4af37;border:1px solid rgba(212,175,55,.3);font-weight:700"
onclick="showScreen('inteligente')">Lista Inteligente</button>
</div>

    </section>

    <section id="filmes" class="screen screen-page">
      <div class="toolbar">
        <h2 class="screen-title">Filmes</h2>
        <button class="btn-back" onclick="history.back()">← Dashboard</button>
      </div>

      <div class="content-grid">
        <div class="panel">
          <h3 id="filmesFormTitle">Novo Filme</h3>
          <form id="filmesForm">
            <div class="form-grid">
              <div class="field full">
                <label for="filmesNome">Nome</label>
                <input id="filmesNome" type="text" placeholder="Digite o nome do filme" required />
              </div>
              <div class="field full">
                <label for="filmesGenero">Gênero</label>
                <input id="filmesGenero" type="text" placeholder="Ex.: Ação, Ficção, Terror" required />
              </div>
              <div class="field full">
                <label for="filmesCapa">Capa (URL da imagem)</label>
                <input id="filmesCapa" type="file" accept="image/*" />
              </div>
              <div class="field full">
                <label for="filmesSinopse">Sinopse</label>
                <textarea id="filmesSinopse" placeholder="Digite a sinopse do filme"></textarea>
              </div>
              <div class="field full">
                <label>Classificação</label>
                <div class="stars" id="filmesStars"></div>
              </div>
            </div>
            <div class="actions">
              <button type="submit" class="btn-primary" id="filmesSubmitBtn">Salvar Filme</button>
              <button type="button" class="btn-secondary" onclick="cancelEdit('filmes')">Cancelar</button>
            </div>
          </form>
        </div>

        <div class="panel">
          <h3>Lista de Filmes</h3>
          <div class="search-row">
            <input id="filmesSearch" type="text" placeholder="Buscar por nome ou gênero..." />
            <button class="btn-chip active" id="filmesFilterAll" onclick="setFilter('filmes','all')">Todos</button>
            <button class="btn-chip" id="filmesFilter5" onclick="setFilter('filmes','5')">5★</button>
            <button class="btn-chip" id="filmesFilter4" onclick="setFilter('filmes','4+')">4★+</button>
            <button class="btn-chip" id="filmesFilterAssistido" onclick="setFilter('filmes','assistido')">Assistidos</button>
            <button class="btn-chip" id="filmesFilterPendente" onclick="setFilter('filmes','pendente')">Pendentes</button>
          </div>
          <div class="list" id="filmesList"></div>
        </div>
      </div>

    </section>

    <section id="series" class="screen screen-page">
      <div class="toolbar">
        <h2 class="screen-title">Séries</h2>
        <button class="btn-back" onclick="history.back()">← Dashboard</button>
      </div>

      <div class="content-grid">
        <div class="panel">
          <h3 id="seriesFormTitle">Nova Série</h3>
          <form id="seriesForm">
            <div class="form-grid">
              <div class="field full">
                <label for="seriesNome">Nome</label>
                <input id="seriesNome" type="text" placeholder="Digite o nome da série" required />
              </div>
              <div class="field full">
                <label for="seriesGenero">Gênero</label>
                <input id="seriesGenero" type="text" placeholder="Ex.: Drama, Suspense, Comédia" required />
              </div>
              <div class="field full">
                <label for="seriesCapa">Capa (URL da imagem)</label>
                <input id="seriesCapa" type="file" accept="image/*" />
              </div>
              <div class="field full">
                <label for="seriesSinopse">Sinopse</label>
                <textarea id="seriesSinopse" placeholder="Digite a sinopse da série"></textarea>
              </div>
              <div class="field full">
                <label>Classificação</label>
                <div class="stars" id="seriesStars"></div>
              </div>
            </div>
            <div class="actions">
              <button type="submit" class="btn-primary" id="seriesSubmitBtn">Salvar Série</button>
              <button type="button" class="btn-secondary" onclick="cancelEdit('series')">Cancelar</button>
            </div>
          </form>
        </div>

        <div class="panel">
          <h3>Lista de Séries</h3>
          <div class="search-row">
            <input id="seriesSearch" type="text" placeholder="Buscar por nome ou gênero..." />
            <button class="btn-chip active" id="seriesFilterAll" onclick="setFilter('series','all')">Todos</button>
            <button class="btn-chip" id="seriesFilter5" onclick="setFilter('series','5')">5★</button>
            <button class="btn-chip" id="seriesFilter4" onclick="setFilter('series','4+')">4★+</button>
            <button class="btn-chip" id="seriesFilterAssistido" onclick="setFilter('series','assistido')">Assistidos</button>
            <button class="btn-chip" id="seriesFilterPendente" onclick="setFilter('series','pendente')">Pendentes</button>
          </div>
          <div class="list" id="seriesList"></div>
        </div>
      </div>

    </section>
  
<section id="inteligente" class="screen screen-page">
  <div class="toolbar">
    <h2 class="screen-title">Lista Inteligente</h2>
    <button class="btn-back" onclick="history.back()">← Dashboard</button>
  </div>

  <div class="panel" style="text-align:center">
    <h3>Resumo do Sistema</h3>
    <div id="stats"></div>
  </div>
</section>


    <section id="detalhe" class="screen screen-page">
      <div class="toolbar">
        <h2 class="screen-title" id="detailScreenTitle">Detalhes</h2>
        <button class="btn-back" onclick="goBackFromDetail()">← Voltar</button>
      </div>

      <div class="panel">
        <div class="detail-grid">
          <div>
            <div id="detailCoverWrap" onclick="triggerDetailCoverPicker()" style="cursor:pointer"></div>
            <input id="detailCoverInput" type="file" accept="image/*" style="display:none" onchange="handleDetailCoverChange(event)" />
          </div>
          <div>
            <h3 id="detailTitle">Título</h3>
            <div class="detail-meta" id="detailMeta"></div>
            <div class="detail-synopsis" id="detailSynopsis"></div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <script>
    const STORAGE_KEY = 'filmes_series_alcantara_style_v1';

    let appData = { filmes: [], series: [] };
    let state = {
      filmes: { editingId: null, selectedStars: 0, filter: 'all' },
      series: { editingId: null, selectedStars: 0, filter: 'all' },
      detailReturnTo: 'dashboard',
      currentDetail: { type: null, id: null }
    };

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        appData.filmes = Array.isArray(parsed.filmes) ? parsed.filmes : [];
        appData.series = Array.isArray(parsed.series) ? parsed.series : [];
      } catch (e) {
        console.error('Erro ao carregar dados', e);
      }
    }


    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    let navigationStack = ['dashboard'];

    function activateScreen(id, shouldRender = true, animation = 'anim-enter-right') {
      document.querySelectorAll('.screen').forEach(el => {
        el.classList.remove('active', 'anim-enter-right', 'anim-enter-left', 'anim-detail');
      });

      const target = document.getElementById(id) || document.getElementById('dashboard');
      target.classList.add('active');

      if (animation) {
        target.classList.add(animation);
        setTimeout(() => target.classList.remove(animation), 260);
      }

      if (shouldRender) renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showScreen(id, fromHistory = false, animation = null) {
      const current = navigationStack[navigationStack.length - 1];

      if (!fromHistory && current !== id) {
        navigationStack.push(id);
        history.pushState({ screen: id }, '');
      }

      const finalAnimation = animation || (id === 'detalhe' ? 'anim-detail' : 'anim-enter-right');
      activateScreen(id, true, finalAnimation);
    }

    function createStars(containerId, type) {
      const wrap = document.getElementById(containerId);
      wrap.innerHTML = '';
      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('button');
        star.type = 'button';
        star.className = 'star';
        star.textContent = '★';
        star.onclick = () => setStars(type, i);
        wrap.appendChild(star);
      }
      updateStarsUI(type);
    }

    function setStars(type, value) {
      state[type].selectedStars = value;
      updateStarsUI(type);
    }

    function updateStarsUI(type) {
      const stars = document.querySelectorAll('#' + type + 'Stars .star');
      stars.forEach((star, index) => {
        star.classList.toggle('active', index < state[type].selectedStars);
      });
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
    }

    function renderStars(value) {
      let str = '';
      for (let i = 1; i <= 5; i++) str += i <= value ? '★' : '☆';
      return str;
    }

    function updateDashboard() {
      document.getElementById('countFilmes').textContent = appData.filmes.length;
      document.getElementById('countSeries').textContent = appData.series.length;
    }

    function updateFormHeader(type) {
      const editing = !!state[type].editingId;
      document.getElementById(type + 'FormTitle').textContent = editing
        ? (type === 'filmes' ? 'Editar Filme' : 'Editar Série')
        : (type === 'filmes' ? 'Novo Filme' : 'Nova Série');

      document.getElementById(type + 'SubmitBtn').textContent = editing
        ? 'Salvar Alterações'
        : (type === 'filmes' ? 'Salvar Filme' : 'Salvar Série');
    }

    function clearForm(type) {
      document.getElementById(type + 'Nome').value = '';
      document.getElementById(type + 'Genero').value = '';
      document.getElementById(type + 'Capa').value = '';
      document.getElementById(type + 'Sinopse').value = '';
      state[type].selectedStars = 0;
      state[type].editingId = null;
      updateStarsUI(type);
      updateFormHeader(type);
    }

    function cancelEdit(type) {
      clearForm(type);
    }

    async function handleSubmit(type, event) {
      event.preventDefault();
      const nome = document.getElementById(type + 'Nome').value.trim();
      const genero = document.getElementById(type + 'Genero').value.trim();
      const sinopse = document.getElementById(type + 'Sinopse').value.trim();
      const fileInput = document.getElementById(type + 'Capa');
      let capa = '';

      if (state[type].editingId) {
        const currentItem = appData[type].find(item => item.id === state[type].editingId);
        capa = currentItem?.capa || '';
      }

      if (fileInput.files && fileInput.files[0]) {
        capa = await fileToBase64(fileInput.files[0]);
      }
      const estrelas = state[type].selectedStars;

      if (!nome || !genero) {
        alert('Preencha nome e gênero.');
        return;
      }
      // classificação opcional (pode ser 0 até assistir)
      const estrelasValidadas = (estrelas >= 1 && estrelas <= 5) ? estrelas : 0;

      if (state[type].editingId) {
        appData[type] = appData[type].map(item =>
          item.id === state[type].editingId ? { ...item, nome, genero, capa, sinopse, estrelas: estrelasValidadas, assistido: item.assistido || false } : item
        );
      } else {
        appData[type].unshift({ id: generateId(), nome, genero, capa, sinopse, estrelas: estrelasValidadas, assistido: false });
      }

      saveData();
      clearForm(type);
      renderAll();
    }

    function editItem(type, id) {
      const item = appData[type].find(entry => entry.id === id);
      if (!item) return;
      state[type].editingId = id;
      document.getElementById(type + 'Nome').value = item.nome;
      document.getElementById(type + 'Genero').value = item.genero;
      document.getElementById(type + 'Capa').value = '';
      document.getElementById(type + 'Sinopse').value = item.sinopse || '';
      state[type].selectedStars = item.estrelas;
      updateStarsUI(type);
      updateFormHeader(type);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteItem(type, id) {
      if (!confirm('Deseja excluir este item?')) return;
      appData[type] = appData[type].filter(item => item.id !== id);
      if (state[type].editingId === id) clearForm(type);
      saveData();
      renderAll();
    }

    function setFilter(type, filter) {
      state[type].filter = filter;
      ['All', '5', '4'].forEach(suffix => {
        const btn = document.getElementById(type + 'Filter' + suffix);
        if (btn) btn.classList.remove('active');
      });
      const map = { all: 'All', '5': '5', '4+': '4' };
      const active = document.getElementById(type + 'Filter' + map[filter]);
      if (active) active.classList.add('active');
      renderList(type);
    }

    function getFilteredItems(type) {
      const term = document.getElementById(type + 'Search').value.trim().toLowerCase();
      return appData[type].filter(item => {
        const text = (item.nome + ' ' + item.genero).toLowerCase();
        const searchOk = text.includes(term);
        let filterOk = true;
        if (state[type].filter === '5') filterOk = Number(item.estrelas) === 5;
        if (state[type].filter === '4+') filterOk = Number(item.estrelas) >= 4;
        if (state[type].filter === 'assistido') filterOk = item.assistido === true;
        if (state[type].filter === 'pendente') filterOk = !item.assistido;
        let final = searchOk && filterOk;
        return final;
      });
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderList(type) {
      const list = document.getElementById(type + 'List');
      const label = type === 'filmes' ? 'filme' : 'série';
      let items = getFilteredItems(type);
      // ranking automático por nota
      items = items.sort((a,b)=> (b.estrelas||0) - (a.estrelas||0));

      if (!items.length) {
        list.innerHTML = `<div class="empty">Nenhum ${label} encontrado.</div>`;
        return;
      }

      list.innerHTML = items.map(item => `
        <div class="item" style="${(item.estrelas||0)==5 ? 'box-shadow:0 0 15px #d4af37' : ''}">
          <div class="item-main" onclick="openDetail('${type}','${item.id}')">
            <div class="item-name">${escapeHtml(item.nome)}</div>
            <div class="item-meta">
              <span><strong>Gênero:</strong> ${escapeHtml(item.genero)}</span>
              <span><strong>Nota:</strong> ${Number(item.estrelas)}/5</span>
              <span><strong>Status:</strong> ${item.assistido ? 'Assistido' : 'Pendente'}</span>
            </div>
            <div class="item-stars">${renderStars(Number(item.estrelas))}</div>
          </div>
          <div class="item-actions">
            <button class="btn-list btn-edit" onclick="event.stopPropagation(); editItem('${type}','${item.id}')">Editar</button>
            <button class="btn-list btn-secondary" onclick="event.stopPropagation(); toggleAssistido('${type}','${item.id}')">${item.assistido ? 'Desmarcar' : 'Assistido'}</button>
            <button class="btn-list btn-delete" onclick="event.stopPropagation(); deleteItem('${type}','${item.id}')">Excluir</button>
          </div>
        </div>
      `).join('');
    }

    

    function triggerDetailCoverPicker() {
      const input = document.getElementById('detailCoverInput');
      if (input) input.click();
    }

    async function handleDetailCoverChange(event) {
      const file = event.target.files && event.target.files[0];
      if (!file || !state.currentDetail.type || !state.currentDetail.id) return;

      const capaBase64 = await fileToBase64(file);

      appData[state.currentDetail.type] = appData[state.currentDetail.type].map(item =>
        item.id === state.currentDetail.id ? { ...item, capa: capaBase64 } : item
      );

      saveData();
      openDetail(state.currentDetail.type, state.currentDetail.id);
      event.target.value = '';
    }

    function openDetail(type, id) {
      const item = appData[type].find(entry => entry.id === id);
      if (!item) return;

      state.detailReturnTo = type;
      state.currentDetail = { type, id };
      document.getElementById('detailScreenTitle').textContent = type === 'filmes' ? 'Detalhes do Filme' : 'Detalhes da Série';
      document.getElementById('detailTitle').textContent = item.nome || 'Sem título';

      const notaNumero = Number(item.estrelas) || 0;
      const notaTexto = notaNumero > 0 ? `${renderStars(notaNumero)} (${notaNumero}/5)` : 'Não classificado';
      const statusTexto = item.assistido ? 'Assistido' : 'Pendente';

      if (item.capa) {
        document.getElementById('detailCoverWrap').innerHTML =
          `<img class="detail-cover" src="${escapeHtml(item.capa)}" alt="${escapeHtml(item.nome)}" onerror="this.outerHTML='<div class=&quot;detail-cover-fallback&quot;>Sem Capa</div>'">`;
      } else {
        document.getElementById('detailCoverWrap').innerHTML =
          `<div class="detail-cover-fallback">Sem Capa</div>`;
      }

      document.getElementById('detailMeta').innerHTML = `
        <div class="detail-pill"><strong>Tipo:</strong> ${type === 'filmes' ? 'Filme' : 'Série'}</div>
        <div class="detail-pill"><strong>Gênero:</strong> ${escapeHtml(item.genero || '-')}</div>
        <div class="detail-pill"><strong>Status:</strong> ${statusTexto}</div>
        <div class="detail-pill"><strong>Nota:</strong> ${notaTexto}</div>
      `;

      document.getElementById('detailSynopsis').innerHTML = item.sinopse
        ? escapeHtml(item.sinopse).replace(/\n/g, '<br>')
        : 'Sinopse não cadastrada.';

      showScreen('detalhe');
    }

    function goBackFromDetail() {
      history.back();
    }


function toggleAssistido(type, id) {
  appData[type] = appData[type].map(item =>
    item.id === id ? { ...item, assistido: !item.assistido } : item
  );
  saveData();
  renderAll();
}


function renderStats(){
  const total = appData.filmes.length + appData.series.length;
  const assistidos = [...appData.filmes, ...appData.series].filter(i=>i.assistido === true).length;
  const top = [...appData.filmes, ...appData.series].sort((a,b)=>(b.estrelas||0)-(a.estrelas||0)).slice(0,5);

  let html = `<div>Total: ${total} | Assistidos: ${assistidos}</div>`;
  if(top.length){
    html += '<br><strong>TOP FILMES</strong><br>';
    const topFilmes = appData.filmes.sort((a,b)=>(b.estrelas||0)-(a.estrelas||0)).slice(0,5);
    html += topFilmes.map((i,idx)=>{
  let estrelas = '★'.repeat(i.estrelas||0) + '☆'.repeat(5-(i.estrelas||0));
  let destaque = idx === 0 ? 'style="color:#d4af37;font-weight:900;text-shadow:0 0 10px #d4af37"' : '';
  return `<div ${destaque}>${estrelas} ${i.nome}</div>`;
}).join('');

    html += '<br><br><strong>TOP SÉRIES</strong><br>';
    const topSeries = appData.series.sort((a,b)=>(b.estrelas||0)-(a.estrelas||0)).slice(0,5);
    html += topSeries.map((i,idx)=>{
      let estrelas = '★'.repeat(i.estrelas||0) + '☆'.repeat(5-(i.estrelas||0));
      return `<div>${estrelas} ${i.nome}</div>`;
    }).join('');
  }
  document.getElementById('stats').innerHTML = html;
}

function renderAll() {
      updateDashboard(); renderStats();
      renderList('filmes');
      renderList('series');
    }

    document.getElementById('filmesForm').addEventListener('submit', event => handleSubmit('filmes', event));
    document.getElementById('seriesForm').addEventListener('submit', event => handleSubmit('series', event));
    document.getElementById('filmesSearch').addEventListener('input', () => renderList('filmes'));
    document.getElementById('seriesSearch').addEventListener('input', () => renderList('series'));

    loadData();
    createStars('filmesStars', 'filmes');
    createStars('seriesStars', 'series');
    clearForm('filmes');
    clearForm('series');
    setFilter('filmes', 'all');
    setFilter('series', 'all');
    renderAll();


    window.addEventListener('popstate', (event) => {
      const targetScreen = event.state?.screen || 'dashboard';

      if (navigationStack.length > 1) {
        navigationStack.pop();
      }

      if (navigationStack[navigationStack.length - 1] !== targetScreen) {
        navigationStack[navigationStack.length - 1] = targetScreen;
      }

      const reverseAnimation = targetScreen === 'detalhe' ? 'anim-detail' : 'anim-enter-left';
      activateScreen(targetScreen, true, reverseAnimation);
    });

    window.addEventListener('load', () => {
      history.replaceState({ screen: 'dashboard' }, '');
      navigationStack = ['dashboard'];
    });


    window.addEventListener('load', () => {
      const splash = document.getElementById('splashScreen');
      setTimeout(() => splash?.classList.add('hidden'), 1100);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(err => console.log('SW erro:', err));
      });
    }
  </script>
</body>
</html>
